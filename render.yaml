services:
  - type: web
    name: alphaai-hedge-fund
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: "true"
      - key: WATCHLIST
        value: AAPL,MSFT,GOOGL,NVDA,TSLA,AMZN
